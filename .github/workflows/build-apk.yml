name: Build APK Android

on:
  push:
    branches:
      - main
    paths:
      - 'artifacts/mobile/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build APK Makit+
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer les dependances
        working-directory: artifacts/mobile
        run: npm install --legacy-peer-deps

      - name: Expo Prebuild (generer le projet Android)
        working-directory: artifacts/mobile
        run: npx expo prebuild --platform android --clean --no-install

      - name: Creer le dossier assets
        working-directory: artifacts/mobile
        run: mkdir -p android/app/src/main/assets

      - name: Bundler le JavaScript dans l APK
        working-directory: artifacts/mobile
        run: |
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file node_modules/expo-router/entry.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res/

      - name: Build APK standalone
        working-directory: artifacts/mobile/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Makit-Plus-APK
          path: artifacts/mobile/android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
          if-no-files-found: error

