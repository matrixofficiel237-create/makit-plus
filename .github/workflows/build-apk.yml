name: Build APK Android

on:
  push:
    branches:
      - main
    paths:
      - 'artifacts/mobile/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build APK Makit+
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer les dependances
        working-directory: artifacts/mobile
        run: npm install --legacy-peer-deps

      - name: Creer symlink node_modules a la racine (pour Metro)
        run: ln -sf $(pwd)/artifacts/mobile/node_modules ./node_modules

      - name: Expo Prebuild (generer le projet Android)
        working-directory: artifacts/mobile
        run: npx expo prebuild --platform android --clean --no-install

      - name: Build APK release (JS bundle inclus automatiquement)
        working-directory: artifacts/mobile/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Trouver l APK genere
        run: |
          echo "=== Fichiers APK trouves ==="
          find artifacts/mobile/android/app/build/outputs/apk/ -name "*.apk" 2>/dev/null
          APK=$(find artifacts/mobile/android/app/build/outputs/apk/ -name "*.apk" | head -1)
          echo "APK_PATH=$APK" >> $GITHUB_ENV

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Makit-Plus-APK
          path: ${{ env.APK_PATH }}
          retention-days: 30
          if-no-files-found: error

